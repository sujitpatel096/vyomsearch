name: SME Announcement Bot

on:
  schedule:
    - cron: '*/15 3-11 * * 1-5'  # Every 15 min, 8:30am-5pm IST (Mon-Fri)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: |
          pip install requests jinja2 playwright

      - name: Install Playwright Chromium
        run: |
          playwright install chromium --with-deps

      - name: Restore sent announcements cache
        uses: actions/cache@v4
        with:
          path: |
            sent_announcements.json
            bse_sme_scrips.json
          key: sme-cache-${{ github.run_id }}
          restore-keys: |
            sme-cache-

      - name: Run SME bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python nse_sme_circular.py

      - name: Save cache
        uses: actions/cache@v4
        if: always()
        with:
          path: |
            sent_announcements.json
            bse_sme_scrips.json
          key: sme-cache-${{ github.run_id }}
