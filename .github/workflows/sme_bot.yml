name: NSE SME Announcement Bot

on:
  schedule:
    # Every 15 minutes, 9 AM - 10 PM IST (3:30 UTC - 16:30 UTC), weekdays only
    - cron: '*/15 3-16 * * 1-5'
  
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run SME Bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python sme_bot.py
