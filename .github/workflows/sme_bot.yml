name: SME Announcement Bot (NSE + BSE)

on:
  schedule:
    # Every 15 minutes, 9 AM - 10 PM IST (3:30 UTC - 16:30 UTC), weekdays only
    - cron: '*/15 3-16 * * 1-5'

  workflow_dispatch:

concurrency:
  group: sme-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run SME Bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python sme_bot.py

    - name: Persist tracking data
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase origin main || true
        git add sent_announcements.json bse_sme_scrips.json
        git diff --cached --quiet || git commit -m "Update tracking data [skip ci]"
        git push || true
