on:
  schedule:
    # Weekdays: Every 30 minutes from 7:30 AM to 10:29 PM IST
    - cron: '0,30 2-16 * * 1-5'
    
    # Weekends: Every 2 hours from 7:30 AM to 10:29 PM IST
    - cron: '0 2,4,6,8,10,12,14,16 * * 0,6'
  
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run SME Bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python sme_bot.py
